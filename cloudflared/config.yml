# ============================================================
# FIGYELEM: Worker mód aktív – VPS + Tunnel NEM szükséges!
# ============================================================
#
# A backend Cloudflare Worker-ként fut, nem VPS-en.
# Ez a fájl csak akkor kell, ha a Google Meet BOT funkciót
# is szeretnéd (Playwright), ami Workerben nem futhat.
#
# Bot nélkül: ezt a fájlt figyelmen kívül hagyhatod.
#
# ============================================================
# Ha BOT kell (opcionális, VPS + Tunnel):
# 1. `cloudflared tunnel login`
# 2. `cloudflared tunnel create meeting-bot`
# 3. TUNNEL_ID kitöltése lentebb
# 4. `cloudflared tunnel route dns meeting-bot bot.bildr.hu`

tunnel: TUNNEL_ID_CSAK_BOT_HOHOZ
credentials-file: /etc/cloudflared/TUNNEL_ID.json

ingress:
  - hostname: bot.bildr.hu
    service: http://localhost:8000
  - service: http_status:404
