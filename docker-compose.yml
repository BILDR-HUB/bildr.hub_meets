version: "3.8"

services:
  # ── FastAPI Backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meeting-app-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:8000:8000"   # csak localhost – Cloudflare Tunnel kezeli
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Cloudflare Tunnel ──────────────────────────────────────────────
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: meeting-app-tunnel
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared
    depends_on:
      backend:
        condition: service_healthy

  # ── PostgreSQL (local dev only) ────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: meeting-app-db
    profiles: ["dev"]            # csak `docker compose --profile dev up`-pal indul
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meeting_app
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
